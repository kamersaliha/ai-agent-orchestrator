# Run the whole stack anywhere (Mac / Linux / Windows) the same way:
#   docker compose up --build
# Then: curl -N -X POST localhost:8000/chat -H "Content-Type: application/json" \
#            -d '{"message":"How do I reset my password?"}'

services:
  qdrant:
    image: qdrant/qdrant:latest          # pin a version (e.g. :v1.12.4) for reproducibility
    container_name: orchestrator-qdrant
    ports:
      - "6336:6333"                       # host 6336 -> container 6333 (6333 is often taken; dashboard: http://localhost:6336/dashboard)
    volumes:
      - qdrant_data:/qdrant/storage       # persists vectors across restarts
    restart: unless-stopped

  app:
    build: .
    container_name: orchestrator-app
    ports:
      - "8000:8000"
    environment:
      APP_QDRANT_LOCATION: "http://qdrant:6333"   # talk to the real Qdrant container
      APP_LLM_PROVIDER: "mock"
      # --- To use a LOCAL model via Ollama running on the HOST machine, comment the
      #     line above and uncomment these (host.docker.internal = your machine): ---
      # APP_LLM_PROVIDER: "local"
      # APP_LOCAL_BASE_URL: "http://host.docker.internal:11434/v1"
      # APP_LOCAL_MODEL: "llama3.2:1b"
      # APP_LOCAL_ROUTER_MODEL: "support-router"
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
